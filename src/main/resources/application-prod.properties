spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:none}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
server.tomcat.accesslog.enabled=${TOMCAT_ACCESSLOG_ENABLED:true}
server.tomcat.accesslog.buffered=${TOMCAT_ACCESSLOG_BUFFERED:true}
server.compression.enabled=${SERVER_COMPRESSION_ENABLED:true}
server.compression.mime-types=application/json,application/*+json,text/plain,text/html,text/xml,text/css,application/javascript
server.compression.min-response-size=${SERVER_COMPRESSION_MIN_SIZE:1024}

jwt.secret=${JWT_SECRET}
security.preauthorize.enabled=${PREAUTHORIZE:false}
jwt.expiration=86400000
spring.servlet.multipart.max-file-size=${UPLOAD_MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${UPLOAD_MAX_REQUEST_SIZE:5MB}
app.upload.dir=${UPLOAD_DIR:uploads/images}
app.upload.public-base-url=${UPLOAD_PUBLIC_BASE_URL:}
app.upload.max-size-bytes=${UPLOAD_MAX_SIZE_BYTES:5242880}
app.request-log.body-enabled=${REQUEST_LOG_BODY_ENABLED:false}
app.request-log.max-body-bytes=${REQUEST_LOG_MAX_BODY_BYTES:2048}
psgs.integration.enabled=${PSGS_INTEGRATION_ENABLED:false}
psgs.datasource.url=${PSGS_DB_URL:}
psgs.datasource.username=${PSGS_DB_USERNAME:}
psgs.datasource.password=${PSGS_DB_PASSWORD:}
psgs.datasource.driver-class-name=${PSGS_DB_DRIVER:com.mysql.cj.jdbc.Driver}
psgs.datasource.master-schema=${PSGS_MASTER_SCHEMA:midware_master}
psgs.login.require-password=${PSGS_LOGIN_REQUIRE_PASSWORD:false}
