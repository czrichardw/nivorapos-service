spring.application.name=pos-service
# Prefix every log line with the request id (from MDC). Empty when
# logging outside an HTTP request (startup, scheduled jobs, etc.).
logging.pattern.level=%5p [%X{requestId:-}]

# Tomcat access log — measures the full request lifecycle from
# socket accept to socket close (%D = total ms). Compare against
# RequestResponseLoggingFilter's Duration to spot time spent in
# the Spring Security filter chain or other pre-filter work.
server.tomcat.accesslog.enabled=true
server.tomcat.accesslog.directory=logs
server.tomcat.accesslog.prefix=access
server.tomcat.accesslog.suffix=.log
server.tomcat.accesslog.buffered=false
# %t request time | %a remote ip | "%r" request line | %s status
# %b bytes sent | %D total time (ms) | reqId from response header
server.tomcat.accesslog.pattern=%t %a "%r" %s %b %D ms reqId=%{X-Request-Id}o
server.compression.enabled=true
server.compression.mime-types=application/json,application/*+json,text/plain,text/html,text/xml,text/css,application/javascript
server.compression.min-response-size=1024
spring.datasource.url=jdbc:postgresql://157.10.161.207:5432/nivora-pos-db
spring.datasource.username=postgres
spring.datasource.password=ShaninHanan23
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Jakarta
