# Activate with: --spring.profiles.active=debug
# Goal: surface DB bottlenecks (N+1, slow queries) without changing prod behavior.

# Per-request aggregate stats (query count, JDBC time, etc.)
spring.jpa.properties.hibernate.generate_statistics=true
logging.level.org.hibernate.stats=DEBUG

# Log only queries slower than this threshold (ms). Adjust as needed.
spring.jpa.properties.hibernate.session.events.log.LOG_QUERIES_SLOWER_THAN_MS=50
logging.level.org.hibernate.SQL_SLOW=INFO

# Uncomment if you also want every SQL printed (very noisy)
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Show HikariCP pool state to spot contention
logging.level.com.zaxxer.hikari=INFO
logging.level.com.zaxxer.hikari.HikariConfig=DEBUG
