# Activate with: --spring.profiles.active=debug
# Goal: surface DB bottlenecks (N+1, slow queries) without changing prod behavior.

server.tomcat.accesslog.enabled=true
server.tomcat.accesslog.pattern=%t %a "%r" %s %b %D ms reqId=%{X-Request-Id}o

# Per-request aggregate stats (query count, JDBC time, etc.)
spring.jpa.properties.hibernate.generate_statistics=true
logging.level.org.hibernate.stats=DEBUG
logging.level.id.nivorapos.pos_service.config.RequestResponseLoggingFilter=DEBUG
logging.level.id.nivorapos.pos_service.service.TransactionService=DEBUG
logging.level.id.nivorapos.pos_service.service.PsgsTokenAuthCacheCleanupJob=DEBUG

# Log only queries slower than this threshold (ms). Adjust as needed.
spring.jpa.properties.hibernate.session.events.log.LOG_QUERIES_SLOWER_THAN_MS=50
logging.level.org.hibernate.SQL_SLOW=INFO

# PSGS uses raw JDBC instead of Hibernate, so it needs a datasource-level proxy.
app.psgs-jdbc-log.enabled=true
app.psgs-jdbc-log.slow-threshold-ms=50
logging.level.id.nivorapos.pos_service.config.PsgsJdbcLoggingDataSource=DEBUG
logging.level.id.nivorapos.pos_service.security.JwtAuthenticationFilter=DEBUG

# Uncomment if you also want every SQL printed (very noisy)
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Show HikariCP pool state to spot contention
logging.level.com.zaxxer.hikari=INFO
logging.level.com.zaxxer.hikari.HikariConfig=DEBUG
